openapi: 3.0.0
info:
  title: Royal App Backend API
  description: Website monitoring and staff management system with bill tracking
  version: 1.0.0
  contact:
    name: API Support
    email: faisalnkpadi@gmail.com

servers:
  - url: http://localhost:9999/api
    description: Development Server
  - url: https://api.rowbest.com/api
    description: Production Server

paths:
  /health:
    get:
      tags:
        - System
      summary: Health check
      description: Returns the health status of the API server
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Server is running
                  timestamp:
                    type: string
                    format: date-time
                    example: 2026-06-27T16:47:00.000Z

  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                name:
                  type: string
                  nullable: true
                  example: ANAS
                password:
                  type: string
                  minLength: 4
                  example: "1234"
                user_id:
                  type: integer
                  example: 3027
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User registered successfully
                  data:
                    $ref: '#/components/schemas/UserResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      description: Authenticate user with email and password, returns JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: ANASROYAL@GMAIL.COM
                password:
                  type: string
                  example: "1234"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Login successful
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  data:
                    $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user profile
      description: Retrieve the authenticated user's profile information
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized - no token or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/push-token:
    put:
      tags:
        - Authentication
      summary: Save the current user's Expo push token
      description: Stores the device's Expo push token on the authenticated user's staff record, for sending push notifications later
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - expoPushToken
              properties:
                expoPushToken:
                  type: string
                  example: ExponentPushToken[xxxxxxxxxxxxxxxxxxxxxx]
      responses:
        '200':
          description: Push token saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      expoPushToken:
                        type: string
        '400':
          description: expoPushToken missing from request body
        '401':
          description: Unauthorized - no token or invalid token
        '404':
          description: Staff record not found for this user

  /auth/users:
    get:
      tags:
        - Authentication
      summary: Get all users
      description: Retrieve list of all users (requires authentication)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of all users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 7
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /staff:
    get:
      tags:
        - Staff
      summary: Get all staff
      description: Retrieve list of all staff members (MANAGER ONLY)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of all staff
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 7
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StaffResponse'
        '401':
          description: Unauthorized - no token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - insufficient permissions (staff role cannot access)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /staff/{id}:
    get:
      tags:
        - Staff
      summary: Get staff by ID
      description: Retrieve a specific staff member (staff can only access their own record, managers can access any)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Staff ID
          schema:
            type: integer
            example: 2645
      responses:
        '200':
          description: Staff details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/StaffResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - staff can only access their own record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Staff not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ledger/customers:
    get:
      tags:
        - Ledger
      summary: List ledger customers
      description: Paginated list of all rowbest ledger customers with dr/cr summary - managers only
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: Filter by customer name
          schema:
            type: string
      responses:
        '200':
          description: Paginated ledger customers
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      pages:
                        type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LedgerCustomerResponse'
        '403':
          description: Forbidden - managers only

  /ledger/customers/{ledgerId}:
    get:
      tags:
        - Ledger
      summary: Get a customer's ledger detail
      description: Returns the customer record and its synced transactions, optionally filtered by date range
      security:
        - BearerAuth: []
      parameters:
        - name: ledgerId
          in: path
          required: true
          description: Rowbest ledger id
          schema:
            type: integer
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Ledger customer and its transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      customer:
                        $ref: '#/components/schemas/LedgerCustomerResponse'
                      entries:
                        type: array
                        description: Synced transactions for this customer
                        items:
                          type: object
        '404':
          description: Ledger customer not found

  /ledger/customers/{ledgerId}/opening-balance:
    get:
      tags:
        - Ledger
      summary: Get opening/closing balance for a date range
      description: Computed live against rowbest (not from locally-synced data) for accuracy over arbitrary date ranges
      security:
        - BearerAuth: []
      parameters:
        - name: ledgerId
          in: path
          required: true
          schema:
            type: integer
        - name: from_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Opening and closing balance for the period
        '400':
          description: from_date and to_date are required

  /ledger/staff/{userId}:
    get:
      tags:
        - Ledger
      summary: Get a staff member's ledger entries
      description: Staff can only access their own, managers can access any
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated ledger entries with debit/credit totals
        '403':
          description: Forbidden - staff can only access their own entries
        '404':
          description: Staff record not found

  /ledger/staff/{userId}/outstanding:
    get:
      tags:
        - Ledger
      summary: Get customers currently owned by a staff member, with outstanding
      description: >
        Returns customers currently assigned to this staff (per the
        ownership cutoff rule in Settings key `ledger_ownership_cutoff_date`
        - before the cutoff, ownership comes from the manually-maintained
        staff-customer mapping spreadsheet; after it, ownership is derived
        dynamically from each customer's most recent matched Sales voucher).
        Each customer includes its live outstanding balance and a breakdown
        of which staff have historically sold to them (no single "owner" is
        forced on the sales-contribution side). Staff can only access their
        own, managers can access any.
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: Filter by customer name
          schema:
            type: string
        - name: filter
          in: query
          description: >
            Filter by follow-up status. `paid` means the customer has at
            least one follow-up resolved by a payment. `follow_up_insights`
            in the response is always computed over the full owned set,
            regardless of this filter.
          schema:
            type: string
            enum: [all, followed_up, not_followed_up, paid, overdue, open_followup]
            default: all
      responses:
        '200':
          description: Paginated customers owned by this staff, with outstanding and sales-contribution totals
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      pages:
                        type: integer
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        ledger_id:
                          type: integer
                          example: 688580
                        name:
                          type: string
                          example: C- ANEES
                        mobile:
                          type: string
                          nullable: true
                          description: Customer's mobile number from rowbest, if on file
                          example: "9846220088"
                        outstanding_balance:
                          type: number
                          example: 8064269
                        outstanding_dr_cr:
                          type: string
                          enum: [Dr, Cr]
                        ownership_source:
                          type: string
                          enum: [assigned, dynamic, unassigned]
                          description: Whether ownership came from the spreadsheet (assigned), derived post-cutoff (dynamic), or is unset
                        staff_sales_total:
                          type: number
                          description: This staff's share of total Sales debit to this customer
                        other_contributors:
                          type: array
                          items:
                            type: object
                            properties:
                              staff_id:
                                type: integer
                              staff_name:
                                type: string
                              sales_total:
                                type: number
                        follow_up:
                          type: object
                          description: Follow-up activity for this specific customer
                          properties:
                            total:
                              type: integer
                            open:
                              type: integer
                              description: Not yet resolved by a payment
                            resolved:
                              type: integer
                            last_logged_at:
                              type: string
                              format: date-time
                              nullable: true
                            last_outcome:
                              type: string
                              nullable: true
                              enum: [promisedToPay, promisedPartial, dispute, noResponse]
                            next_followup_date:
                              type: string
                              format: date-time
                              nullable: true
                            is_overdue:
                              type: boolean
                              description: Has an open follow-up whose nextFollowUpDate has passed
                            total_promised_amount:
                              type: number
                              description: Sum of promisedAmount across still-open follow-ups
                  filter:
                    type: string
                    enum: [all, followed_up, not_followed_up, paid, overdue, open_followup]
                    description: The filter that was applied to `data`
                  totals:
                    type: object
                    properties:
                      total_outstanding:
                        type: number
                      total_staff_sales:
                        type: number
                  follow_up_insights:
                    type: object
                    description: >
                      Staff-wide follow-up effectiveness, computed across all
                      owned customers (not just the current page) - answers
                      "how much did we follow up, how much did we actually
                      receive".
                    properties:
                      customers_total:
                        type: integer
                      customers_never_followed_up:
                        type: integer
                        description: Owned customers with zero follow-up records ever - a coverage gap
                      customers_overdue_followup:
                        type: integer
                        description: Owned customers with an open follow-up whose next-followup date has passed
                      total_followups:
                        type: integer
                      open_followups:
                        type: integer
                      resolved_followups:
                        type: integer
                      resolution_rate_pct:
                        type: number
                        description: resolved_followups / total_followups * 100
                      by_outcome:
                        type: object
                        additionalProperties:
                          type: integer
                        example: { promisedToPay: 12, dispute: 2, noResponse: 5 }
                      total_promised_amount:
                        type: number
                        description: Sum of promisedAmount across still-open follow-ups
                      total_received_via_resolved_followups:
                        type: number
                        description: Actual credit amount on the vouchers that resolved a follow-up (promised vs. actually collected)
                      avg_days_to_resolve:
                        type: number
                        nullable: true
                        description: Average days between a follow-up being logged and being resolved by payment
        '400':
          description: Invalid filter value
        '403':
          description: Forbidden - staff can only access their own customers
        '404':
          description: Staff record not found

  /ledger/summary/by-group:
    get:
      tags:
        - Ledger
      summary: Ledger balance summary by group
      description: Aggregates customer dr/cr/balance by ledger group (e.g. Sundry Debtors) - managers only
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Balances grouped by ledger group
        '403':
          description: Forbidden - managers only

  /ledger/unmatched:
    get:
      tags:
        - Ledger
      summary: List entries with unresolved sales executive
      description: Ledger entries whose sales_executive name couldn't be matched to a Staff record - managers only
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Paginated unmatched entries
        '403':
          description: Forbidden - managers only

  /ledger/resolve-unmatched:
    post:
      tags:
        - Ledger
      summary: Re-run staff-name matching
      description: DB-only re-resolution pass against already-stored unmatched entries (no rowbest calls) - managers only
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Number of entries checked and resolved
        '403':
          description: Forbidden - managers only

  /ledger/mappings/staff-options:
    get:
      tags:
        - Ledger
      summary: List staff for the mapping-assignment dropdown (superAdmin only)
      description: Lightweight id+name list (sorted by name) of every staff member, for populating a "reassign to" dropdown alongside GET/PUT /ledger/mappings.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Staff options
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        staff_id:
                          type: integer
                          example: 2645
                        name:
                          type: string
                          example: ANAS
        '403':
          description: Forbidden - superAdmin only

  /ledger/mappings:
    get:
      tags:
        - Ledger
      summary: List customer->staff assignments (superAdmin only)
      description: >
        The manually-maintained staff-customer mapping
        (LedgerCustomer.assigned_staff_id) that drives ownership before the
        cutoff date - see GET /ledger/staff/{userId}/outstanding for how
        it's used.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: Filter by customer name or assigned staff name
          schema:
            type: string
      responses:
        '200':
          description: Paginated customer-staff mappings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      pages:
                        type: integer
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        ledger_id:
                          type: integer
                          example: 688580
                        name:
                          type: string
                          example: C- ANEES
                        group:
                          type: string
                          example: Sundry Debtors
                        mobile:
                          type: string
                          nullable: true
                        balance:
                          type: number
                        assigned_staff_id:
                          type: integer
                          nullable: true
                        assigned_staff_name:
                          type: string
                          nullable: true
        '403':
          description: Forbidden - superAdmin only

  /ledger/mappings/{ledgerId}:
    put:
      tags:
        - Ledger
      summary: Reassign a customer to a different staff member (superAdmin only)
      security:
        - BearerAuth: []
      parameters:
        - name: ledgerId
          in: path
          required: true
          description: Rowbest ledger id
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - staffId
              properties:
                staffId:
                  type: integer
                  description: Staff.id (internal id) of the new assignee
                  example: 2645
      responses:
        '200':
          description: Mapping updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      ledger_id:
                        type: integer
                      name:
                        type: string
                      assigned_staff_id:
                        type: integer
                      assigned_staff_name:
                        type: string
        '400':
          description: staffId is required
        '403':
          description: Forbidden - superAdmin only
        '404':
          description: Ledger customer or staff not found

  /followups:
    post:
      tags:
        - Follow-ups
      summary: Log a follow-up
      description: Create a new follow-up record for a customer
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customerId
                - customerName
                - staffId
                - staffName
                - contactMethod
                - outcome
              properties:
                customerId:
                  type: string
                  example: "CUST001"
                customerName:
                  type: string
                  example: "ABC Company"
                ledgerId:
                  type: integer
                  description: >
                    Optional. Rowbest ledger id (LedgerCustomer.ledger_id).
                    If omitted, best-effort resolved server-side by matching
                    customerName - pass it explicitly when known for a
                    reliable join instead of relying on name matching.
                  example: 688580
                staffId:
                  type: integer
                  example: 2645
                userId:
                  type: integer
                  example: 3027
                staffName:
                  type: string
                  example: ANAS
                loggedAt:
                  type: string
                  format: date-time
                  example: 2026-06-19T10:30:00Z
                contactMethod:
                  type: string
                  enum:
                    - phoneCall
                    - sms
                    - email
                    - inPerson
                    - whatsapp
                  example: phoneCall
                outcome:
                  type: string
                  enum:
                    - promisedToPay
                    - promisedPartial
                    - dispute
                    - noResponse
                  example: promisedToPay
                promisedAmount:
                  type: number
                  nullable: true
                  example: 5000
                promisedDate:
                  type: string
                  format: date
                  nullable: true
                  example: 2026-06-26
                nextFollowUpDate:
                  type: string
                  format: date
                  nullable: true
                  example: 2026-06-25
                quickRemarks:
                  type: array
                  items:
                    type: string
                  example:
                    - Customer interested
                    - Will call back
                freeTextRemark:
                  type: string
                  nullable: true
                  example: Customer is in a difficult situation
                disputeDetails:
                  type: string
                  nullable: true
                  example: Customer claims amount is incorrect
      responses:
        '201':
          description: Follow-up logged successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Follow-up logged successfully
                  data:
                    $ref: '#/components/schemas/FollowUpResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /followups/{id}:
    get:
      tags:
        - Follow-ups
      summary: Get follow-up by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Follow-up ID
          schema:
            type: string
      responses:
        '200':
          description: Follow-up details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/FollowUpResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - staff can only access their own follow-ups
        '404':
          description: Follow-up not found
    put:
      tags:
        - Follow-ups
      summary: Update follow-up
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                outcome:
                  type: string
                  enum:
