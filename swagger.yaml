  /dashboard/overview:
    get:
      tags:
        - Dashboard
      summary: Company-wide overview for superAdmin
      description: |
        Totals across the whole company plus a per-staff leaderboard,
        sorted by outstanding balance descending. Outstanding balances are
        always current/live; the follow-up numbers (byOutcome, byResolution,
        totalPromisedAmount, etc.) are scoped to the date range.
      security:
        - BearerAuth: []
      parameters:
        - name: dateField
          in: query
          description: Which date period/startDate/endDate applies to. Defaults to loggedAt (when the call was made).
          schema:
            type: string
            enum: [loggedAt, promisedDate, resolvedAt]
            default: loggedAt
        - name: period
          in: query
          description: Shorthand date filter for the follow-up numbers. Defaults to this_month if neither period nor startDate/endDate is given.
          schema:
            type: string
            enum: [today, yesterday, this_month]
        - name: startDate
          in: query
          description: Custom range start (YYYY-MM-DD), ignored if period is set
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Custom range end (YYYY-MM-DD), ignored if period is set
          schema:
            type: string
            format: date
        - name: outcome
          in: query
          description: Filter the follow-up numbers to a single outcome
          schema:
            type: string
            enum: [promisedToPay, promisedPartial, dispute, noResponse]
        - name: resolutionStatus
          in: query
          description: >
            Filter the follow-up numbers by system-detected payment status -
            `resolved` means a real payment has landed for that customer
            since the follow-up was logged (resolvedByPayment=true),
            `open` means it hasn't yet. Independent of `outcome`.
          schema:
            type: string
            enum: [resolved, open]
      responses:
        '200':
          description: Dashboard overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      generated_at:
                        type: string
                        format: date-time
                      period:
                        type: object
                        properties:
                          startDate:
                            type: string
                            format: date-time
                            nullable: true
                          endDate:
                            type: string
                            format: date-time
                            nullable: true
                          dateField:
                            type: string
                            enum: [loggedAt, promisedDate, resolvedAt]
                      totals:
                        type: object
                        properties:
                          total_staff:
                            type: integer
                          total_customers:
                            type: integer
                          total_outstanding:
                            type: number
                            description: Sum of balance (dr - cr) across all Sundry Debtors customers, live/current
                      followups:
                        type: object
                        description: Company-wide, same shape as /followups/stats/total
                        properties:
                          totalFollowUps:
                            type: integer
                          uniqueStaffCount:
                            type: integer
                          uniqueCustomerCount:
                            type: integer
                          byOutcome:
                            type: object
                            additionalProperties:
                              type: integer
                          byResolution:
                            type: object
                            properties:
                              resolved:
                                type: integer
                              open:
                                type: integer
                          totalFollowedUpAmount:
                            type: number
                          totalPromisedAmount:
                            type: number
                          totalPaidAmount:
                            type: number
                      notifications:
                        type: object
                        properties:
                          sent_in_period:
                            type: integer
                          unread_total:
                            type: integer
                            description: Across all staff, all-time (not scoped to the date range)
                      staff_leaderboard:
                        type: array
                        description: One entry per staff member, sorted by total_outstanding descending
                        items:
                          type: object
                          properties:
                            staff_id:
                              type: integer
                            user_id:
                              type: integer
                            staff_name:
                              type: string
                            customers_owned:
                              type: integer
                            total_outstanding:
                              type: number
                            totalFollowUps:
                              type: integer
                            byOutcome:
                              type: object
                              additionalProperties:
                                type: integer
                            byResolution:
                              type: object
                              properties:
                                resolved:
                                  type: integer
                                open:
                                  type: integer
                            totalFollowedUpAmount:
                              type: number
                            totalPromisedAmount:
                              type: number
                            totalPaidAmount:
                              type: number
        '400':
          description: Invalid dateField, period, outcome, or resolutionStatus value
        '403':
          description: Forbidden - superAdmin only

  /attendance/scan:
    post:
      tags:
        - Attendance
      summary: Scan fingerprint for attendance (check-in/check-out)
      description: Scan staff member's fingerprint for attendance marking. Public endpoint (no auth required). Toggle between check-in and check-out automatically. Supports multiple sessions per day.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - staffId
                - fingerprintTemplate
                - timestamp
              properties:
                staffId:
                  type: integer
                  example: 2645
                  description: Staff ID to identify the employee
                fingerprintTemplate:
                  type: string
                  format: byte
                  example: "QmFzZTY0RW5jb2RlZEZpbmdlcnByaW50VGVtcGxhdGU="
                  description: Base64 encoded fingerprint template from device sensor
                timestamp:
                  type: string
                  format: date-time
                  example: 2026-06-29T09:30:45.123Z
      responses:
        '200':
          description: Fingerprint scan result (matched)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  matched:
                    type: boolean
                    example: true
                  staff:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 2645
                      name:
                        type: string
                        example: ANAS
                  confidence:
                    type: number
                    example: 0.95
                    description: Fingerprint match confidence (0-1), 0.90+ required
                  action:
                    type: string
                    enum: [checkIn, checkOut]
                    example: checkIn
                  attendance:
                    type: object
                    properties:
                      id:
                        type: string
                      staffId:
                        type: integer
                      date:
                        type: string
                        example: 2026-06-29
                      sessionCount:
                        type: integer
                        example: 1
                      sessions:
                        type: array
                        description: Multiple sessions for breaks and meals
                        items:
                          type: object
                          properties:
                            sessionNumber:
                              type: integer
                            checkIn:
                              type: string
                              format: date-time
                            checkOut:
                              type: string
                              format: date-time
                              nullable: true
                            workHours:
                              type: number
                              nullable: true
                      totalWorkHours:
                        type: number
                        example: 2.5
                      totalBreakTime:
                        type: number
                        example: 0.5
                      status:
                        type: string
                        enum: [present, absent, late]
        '400':
          description: Bad request - invalid fingerprint or staff not found

  /attendance/enroll/{staffId}:
    post:
      tags:
        - Attendance
      summary: Enroll staff member's fingerprint
      description: Register a staff member's fingerprint for attendance recognition. Requires 3 scans minimum for optimal accuracy. Progressive enrollment (call this endpoint 3 times).
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          schema:
            type: integer
            example: 2645
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fingerprintTemplate
              properties:
                fingerprintTemplate:
                  type: string
                  format: byte
                  example: "QmFzZTY0RW5jb2RlZEZpbmdlcnByaW50VGVtcGxhdGU="
                  description: Base64 encoded fingerprint template from device sensor
      responses:
        '200':
          description: Fingerprint enrollment successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
