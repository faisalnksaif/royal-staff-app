  /followups/staff/{staffId}:
    get:
      tags:
        - Follow-ups
      summary: Get follow-ups by staff, with filters and a summary
      description: |
        Staff can only access their own, managers can access any.
        Returns a paginated list plus a `summary` block (outcome
        breakdown, resolved/open counts, promised/recovered totals)
        computed over the same filtered set, not just the current page.
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: dateField
          in: query
          description: Which date period/startDate/endDate applies to. Defaults to loggedAt (when the call was made).
          schema:
            type: string
            enum: [loggedAt, promisedDate, resolvedAt]
            default: loggedAt
        - name: period
          in: query
          description: Shorthand date filter - `today`, `yesterday`, or `this_month`. Overrides startDate/endDate if both given.
          schema:
            type: string
            enum: [today, yesterday, this_month]
        - name: startDate
          in: query
          description: Custom range start (YYYY-MM-DD), ignored if period is set
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Custom range end (YYYY-MM-DD), ignored if period is set
          schema:
            type: string
            format: date
        - name: customerId
          in: query
          description: Filter to a single customer by the legacy string customerId
          schema:
            type: string
        - name: ledgerId
          in: query
          description: Filter to a single customer by ledger_id (takes precedence over customerId if both given)
          schema:
            type: integer
        - name: outcome
          in: query
          description: Filter to a single outcome (e.g. noResponse)
          schema:
            type: string
            enum: [promisedToPay, promisedPartial, dispute, noResponse]
      responses:
        '200':
          description: Paginated follow-ups with a summary block
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      pages:
                        type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FollowUpResponse'
                  summary:
                    type: object
                    description: Two independent classifications - byOutcome is human-entered, byResolution is system-detected. A follow-up can be `open` in byResolution while its outcome is anything, or `resolved` while its outcome is still e.g. promisedToPay if the staff never updated it after payment landed.
                    properties:
                      totalFollowUps:
                        type: integer
                      byOutcome:
                        type: object
                        description: What the staff member selected when logging the call
                        properties:
                          promisedToPay:
                            type: integer
                          promisedPartial:
                            type: integer
                          dispute:
                            type: integer
                          noResponse:
                            type: integer
                      byResolution:
                        type: object
                        description: Whether the ledger sync has detected a real payment for this customer since the follow-up was logged
                        properties:
                          resolved:
                            type: integer
                          open:
                            type: integer
                      totalFollowedUpAmount:
                        type: number
                        description: Sum of each customer's outstanding balance at the moment they were followed up on
                      totalPromisedAmount:
                        type: number
                      totalPaidAmount:
                        type: number
                        description: Sum of amountRecovered across resolved follow-ups - actual money collected as a result
        '400':
          description: Invalid dateField or outcome value
        '403':
          description: Forbidden - staff can only access their own follow-ups

