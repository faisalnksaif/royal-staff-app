  /followups/{id}/whatsapp:
    post:
      tags:
        - Follow-ups
      summary: Log a WhatsApp message send
      description: |
        Records that a WhatsApp message was sent for this follow-up - the
        actual send happens client-side (e.g. via a WhatsApp deep link),
        this just logs it. Fire-and-forget from the frontend's perspective.
        Updates whatsapp.lastReceiptSentAt/lastReminderSentAt on the
        follow-up (see FollowUpResponse) so the card can show send status
        without an extra query, and appends a full audit entry.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - staffId
                - type
                - mobile
              properties:
                staffId:
                  type: integer
                  example: 12
                type:
                  type: string
                  enum: [receipt, reminder]
                mobile:
                  type: string
                  example: "919876543210"
                amountMentioned:
                  type: number
                  nullable: true
                  example: 5000
      responses:
        '201':
          description: WhatsApp send logged
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                      sentAt:
                        type: string
                        format: date-time
        '400':
          description: Missing required fields or invalid type
        '403':
          description: Forbidden - staff can only log sends for their own follow-ups
        '404':
          description: Follow-up not found

  /followups/all:
    get:
      tags:
        - Follow-ups
      summary: Get all follow-ups across all staff (superAdmin only)
      description: |
        Company-wide follow-up list, optionally narrowed to one staff via
        `staffId`. Same filter convention and `summary` block as
        GET /followups/staff/{staffId} - the only difference is `staffId`
        is optional here (omit it to see every staff member's follow-ups).
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: staffId
          in: query
          description: Narrow to a single staff member (the same staffId convention as FollowUpResponse.staffId - a user_id, not an internal Staff.id)
          schema:
            type: integer
        - name: dateField
          in: query
          description: Which date period/startDate/endDate applies to. Defaults to loggedAt (when the call was made).
          schema:
            type: string
            enum: [loggedAt, promisedDate, resolvedAt]
            default: loggedAt
        - name: period
          in: query
          description: Shorthand date filter - `today`, `yesterday`, or `this_month`. Overrides startDate/endDate if given.
          schema:
            type: string
            enum: [today, yesterday, this_month]
        - name: startDate
          in: query
          description: Custom range start (YYYY-MM-DD), ignored if period is set
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Custom range end (YYYY-MM-DD), ignored if period is set
          schema:
            type: string
            format: date
        - name: customerId
          in: query
          description: Filter to a single customer by the legacy string customerId
          schema:
            type: string
        - name: ledgerId
          in: query
          description: Filter to a single customer by ledger_id (takes precedence over customerId if both given)
          schema:
            type: integer
        - name: outcome
          in: query
          description: Filter to a single outcome
          schema:
            type: string
            enum: [promisedToPay, promisedPartial, dispute, noResponse]
      responses:
        '200':
          description: Paginated follow-ups across all (or one) staff, with a summary block
          content:
