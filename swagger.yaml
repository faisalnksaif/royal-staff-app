                    properties:
                      totalFollowUps:
                        type: integer
                      byOutcome:
                        type: object
                        additionalProperties:
                          type: integer
                      byResolution:
                        type: object
                        properties:
                          resolved:
                            type: integer
                          open:
                            type: integer
                      totalFollowedUpAmount:
                        type: number
                      totalPromisedAmount:
                        type: number
                      totalPaidAmount:
                        type: number
        '400':
          description: Invalid dateField or outcome value
        '403':
          description: Forbidden - superAdmin only

