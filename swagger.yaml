          description: Forbidden - superadmin only

  /scores/calculate-monthly:
    post:
      tags:
        - Scoring
      summary: Calculate monthly scores for all staff (SUPER ADMIN ONLY)
      description: |
        Trigger score calculation for all active staff for a given month.

        This endpoint analyzes:
        - **Attendance**: Late arrivals (>30 mins) vs max allowed (3)
        - **Leaves**: Approved leaves vs monthly limit (2)
        - **Appearance**: Dress code violation days vs max violations

        Scores are saved to database for fast retrieval. Can be called:
        - At month-end to finalize scores
        - Anytime to recalculate if rules or data changed
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                month:
                  type: string
                  format: date
                  pattern: '^\d{4}-\d{2}$'
                  example: "2026-06"
                  description: Month in YYYY-MM format to calculate (default current month)
      responses:
        '200':
          description: Scores calculated and saved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      month:
                        type: string
                        example: "2026-06"
                      calculatedCount:
                        type: integer
                        description: Number of staff scores calculated/updated
                        example: 13
                      totalStaff:
                        type: integer
                        description: Total active staff
                        example: 13
                      scores:
                        type: array
                        description: All calculated scores
                        items:
                          $ref: '#/components/schemas/StaffScoreResponse'
                      errors:
                        type: array
                        items:
                          type: string
                        nullable: true
                        description: Any errors encountered during calculation
        '403':
          description: Forbidden - superadmin only

  /extra-performance:
    get:
      tags:
        - Extra Performance
      summary: Get all performances
      description: |
        Retrieve all performances (pending, approved, rejected) for authenticated user or specific user (SuperAdmin only).

        **Default behavior:** Returns authenticated user's all performances.
        **With userId param:** SuperAdmin can view any user's performances.
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
          description: (SuperAdmin only) View specific user's performances instead of own
          example: 2645
      responses:
        '200':
          description: All performances with status breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      userId:
                        type: integer
                      staffName:
                        type: string
                      stats:
                        type: object
                        properties:
                          total:
                            type: integer
                          approved:
                            type: integer
                          pending:
                            type: integer
                          rejected:
                            type: integer
                      performances:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExtraPerformanceResponse'
        '400':
          description: Bad request - user not associated with staff
        '403':
          description: Forbidden - staff can only view their own
        '404':
          description: Staff not found

    post:
      tags:
        - Extra Performance
      summary: Submit extra performance for approval
      description: Staff submit evidence of extra performance/achievement for approval by SuperAdmin. Approved submissions award 10 points to monthly score.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
                - date
              properties:
                title:
                  type: string
                  description: Brief title of the performance
                  example: "Led customer training session"
                description:
                  type: string
                  description: Detailed description of what was accomplished
                  example: "Conducted comprehensive training for 15 customers on new product features"
                date:
                  type: string
                  format: date
                  description: Date when performance occurred (IST)
                  example: "2026-06-28"
                category:
                  type: string
                  description: Performance category
                  enum: [Training, "Process Improvement", "Customer Excellence", "Team Leadership", Other]
                  example: "Training"
      responses:
        '201':
          description: Performance submitted successfully (pending approval)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ExtraPerformanceResponse'
        '400':
          description: Bad request - missing required fields
        '401':
          description: Unauthorized

  /extra-performance/pending:
    get:
      tags:
        - Extra Performance
      summary: Get pending performances for approval (SUPER ADMIN ONLY)
      description: Retrieve all pending performance submissions across all staff for a given month. SuperAdmin uses this to review and approve/reject submissions.
      security:
        - BearerAuth: []
      parameters:
        - name: month
          in: query
          schema:
            type: string
            format: date
            pattern: '^\d{4}-\d{2}$'
          description: Month in YYYY-MM format (default current month)
          example: "2026-06"
      responses:
        '200':
          description: List of pending performances
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      month:
                        type: string
                      count:
                        type: integer
                      performances:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExtraPerformanceResponse'
        '403':
          description: Forbidden - superadmin only

  /extra-performance/{performanceId}/approve:
    put:
      tags:
        - Extra Performance
      summary: Approve extra performance (SUPER ADMIN ONLY)
      description: Approve a pending performance submission. Staff will receive 10 points on monthly score.
      security:
        - BearerAuth: []
      parameters:
        - name: performanceId
          in: path
          required: true
          schema:
            type: string
          description: Performance submission ID
      responses:
        '200':
          description: Performance approved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ExtraPerformanceResponse'
        '403':
          description: Forbidden - superadmin only
        '404':
          description: Performance not found

  /extra-performance/{performanceId}/reject:
    put:
      tags:
        - Extra Performance
      summary: Reject extra performance (SUPER ADMIN ONLY)
      description: Reject a pending performance submission with a reason.
      security:
        - BearerAuth: []
      parameters:
        - name: performanceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rejectionReason
              properties:
                rejectionReason:
                  type: string
                  description: Reason for rejection
                  example: "Insufficient detail provided"
      responses:
        '200':
          description: Performance rejected successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ExtraPerformanceResponse'
        '400':
          description: Bad request - missing rejectionReason
        '403':
          description: Forbidden - superadmin only
        '404':
          description: Performance not found

  /extra-performance/approved:
    get:
      tags:
        - Extra Performance
      summary: Get approved performances
      description: |
        Retrieve approved extra performances for authenticated user or specific user (SuperAdmin only).

        **Default behavior:** Returns authenticated user's approved performances.
        **With userId param:** SuperAdmin can view any user's approved performances.
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
          description: (SuperAdmin only) View specific user's performances instead of own
          example: 2645
        - name: month
          in: query
          schema:
            type: string
            format: date
            pattern: '^\d{4}-\d{2}$'
          description: Month in YYYY-MM format (default current month)
          example: "2026-06"
      responses:
        '200':
          description: Approved performances with points summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      staffId:
                        type: integer
                      staffName:
                        type: string
                      month:
                        type: string
                      count:
                        type: integer
                      totalPoints:
                        type: integer
                        description: Total points earned (count × 10)
                      performances:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExtraPerformanceResponse'
        '400':
          description: Bad request - user not associated with staff
        '403':
          description: Forbidden - staff can only view their own
        '404':
          description: Staff not found

  /scoring-config:
    get:
      tags:
        - Scoring
      summary: Get scoring configuration (SUPER ADMIN ONLY)
      description: Retrieve the scoring rules and parameters for a given month.
      security:
        - BearerAuth: []
      parameters:
        - name: month
          in: query
          schema:
            type: string
            format: date
            pattern: '^\d{4}-\d{2}$'
          description: Month in YYYY-MM format (default current month)
          example: "2026-06"
      responses:
        '200':
          description: Scoring configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ScoringConfigResponse'
        '403':
          description: Forbidden - superadmin only
        '404':
          description: Configuration not found

    put:
      tags:
        - Scoring
      summary: Update scoring configuration (SUPER ADMIN ONLY)
      description: Update the scoring rules and parameters for a month. SuperAdmin only.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                month:
                  type: string
                  format: date
                  pattern: '^\d{4}-\d{2}$'
                  example: "2026-06"
                  description: Month to update
                attendance:
                  type: object
                  properties:
                    maxLateCases:
                      type: integer
                      example: 3
                    pointsIfNoLate:
                      type: integer
                      example: 10
                    penaltyIfExceeds:
                      type: integer
                      example: -10
                    lateThresholdMinutes:
                      type: integer
                      example: 30
                leaves:
                  type: object
                  properties:
                    maxAllowedPerMonth:
                      type: integer
                      example: 2
                    pointsIfWithinLimit:
                      type: integer
                      example: 10
                    penaltyIfExceeds:
                      type: integer
                      example: -10
                appearance:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      example: true
                    pointsPerViolation:
                      type: integer
                      example: -5
                    maxPoints:
                      type: integer
                      example: 5
                    violations:
                      type: array
                      items:
                        type: string
                      example: ["uniform", "socks_banyan", "hair_beard_moustache"]
      responses:
        '200':
          description: Configuration updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ScoringConfigResponse'
        '403':
          description: Forbidden - superadmin only
        '400':
          description: Bad request - invalid configuration

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login

  schemas:
    LedgerCustomerResponse:
      type: object
      description: A rowbest customer ledger, as synced into LedgerCustomer
      properties:
        ledger_id:
          type: integer
          description: Rowbest ledger id - source of truth key
          example: 688580
        name:
          type: string
          example: C- ANEES
        group:
          type: string
          example: Sundry Debtors
        mobile:
          type: string
          nullable: true
          description: Customer's mobile number from rowbest, if on file
          example: "9846220088"
        dr:
          type: number
          example: 8064269
        cr:
          type: number
          example: 0
        balance:
          type: number
          description: dr - cr
          example: 8064269
        assigned_staff_id:
          type: integer
          nullable: true
          description: Staff currently responsible for this customer (see ownership cutoff rule)
          example: 2646
        assigned_staff_name:
          type: string
          nullable: true
          example: ANSARKA
        fetchedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserResponse:
      type: object
      properties:
        id:
          type: string
          description: MongoDB user ID
          example: 507f1f77bcf86cd799439011
        email:
          type: string
          format: email
          example: ANASROYAL@GMAIL.COM
        name:
          type: string
          nullable: true
          example: ANAS
        user_id:
          type: integer
          nullable: true
          example: 3027
        role:
          type: string
          enum:
            - staff
            - manager
            - superAdmin
          example: staff
        isActive:
          type: boolean
          example: true
      required:
        - id
        - email
        - role
        - isActive

    StaffResponse:
      type: object
      properties:
        id:
          type: integer
          example: 2645
        user_id:
          type: integer
          example: 3027
        name:
          type: string
          example: ANAS
        email:
          type: string
          format: email
          example: ANASROYAL@GMAIL.COM
        phone:
          type: string
          nullable: true
          example: null
        sales_target:
          type: number
          nullable: true
          example: null
        collection_target:
          type: number
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
          example: 2026-06-19T18:00:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-06-19T18:00:00.000Z
      required:
        - id
        - user_id
        - name

    BillResponse:
      type: object
      properties:
        _id:
          type: string
          description: MongoDB bill ID
          example: 507f1f77bcf86cd799439012
        staff_id:
          type: integer
          example: 2645
        user_id:
          type: integer
          example: 3027
        staff_name:
          type: string
          example: ANAS
        voucher_id:
          type: string
          example: INV001
        voucher_date:
          type: string
          format: date
          example: 2026-06-19
        voucher_number:
          type: string
          example: VOL-001
        amount:
          type: number
          example: 10000
        aging_balance:
          type: number
          example: 10000
        aging:
          type: integer
          description: Days overdue
          example: 30
        period:
          type: string
          enum: [historical, current]
          description: Whether bill is before (historical) or after (current) cutoff date
          example: current
        remarks:
          type: string
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
          example: 2026-06-19T18:00:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-06-19T18:00:00.000Z

    FollowUpResponse:
      type: object
      properties:
        _id:
          type: string
          description: MongoDB follow-up ID
          example: 507f1f77bcf86cd799439013
        customerId:
          type: string
          example: CUST001
        customerName:
          type: string
          example: ABC Company
        ledgerId:
          type: integer
          nullable: true
          description: Rowbest ledger id, resolved from customerName if not supplied
          example: 688580
        mobile:
          type: string
          nullable: true
          description: Customer's mobile number - live-joined from LedgerCustomer.mobile on every read (kept current, and filled in for older records that predate the snapshot), falling back to the value captured at logging time if no match is found
          example: "9846220088"
        staffId:
          type: integer
          example: 2645
        userId:
          type: integer
          example: 3027
        staffName:
          type: string
          example: ANAS
        resolvedByPayment:
          type: boolean
          description: Set automatically when a Receipt lands for this customer during ledger sync - never affects `outcome`
          example: false
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        resolvedVoucherId:
          type: integer
          nullable: true
          description: Rowbest voucher id of the Receipt that triggered auto-resolution
        outstandingAmount:
          type: number
          nullable: true
          description: Customer's outstanding balance at the moment this follow-up was logged
          example: 15000
        outstandingDrCr:
          type: string
          enum: [Dr, Cr]
          nullable: true
        outstandingAmountAtResolution:
          type: number
          nullable: true
          description: Customer's outstanding balance at the moment this follow-up was auto-resolved by a payment
          example: 5000
        outstandingDrCrAtResolution:
          type: string
          enum: [Dr, Cr]
          nullable: true
        amountRecovered:
          type: number
          nullable: true
          description: Sign-aware diff (outstandingAmount minus outstandingAmountAtResolution) - positive means the outstanding balance went down. Compare against promisedAmount to see if the promise was kept.
        outstandingBackfilled:
          type: boolean
          description: True if the outstanding-balance fields were filled in by a one-time migration using the balance as of the migration run (not a true historical snapshot), rather than captured live
          example: false
        whatsapp:
          type: object
          description: Denormalized WhatsApp send history, updated by POST /followups/{id}/whatsapp - lets the card show status without an extra query
          properties:
            lastReceiptSentAt:
              type: string
              format: date-time
              nullable: true
            lastReminderSentAt:
              type: string
              format: date-time
              nullable: true
        loggedAt:
          type: string
          format: date-time
          example: 2026-06-19T10:30:00.000Z
        contactMethod:
          type: string
          enum:
            - phoneCall
            - sms
            - email
            - inPerson
            - whatsapp
          example: phoneCall
        outcome:
          type: string
          enum:
            - promisedToPay
            - promisedPartial
            - dispute
            - noResponse
          example: promisedToPay
        promisedAmount:
          type: number
          nullable: true
          example: 5000
        promisedDate:
          type: string
          format: date
          nullable: true
          example: 2026-06-26
        nextFollowUpDate:
          type: string
          format: date
          nullable: true
          example: 2026-06-25
        quickRemarks:
          type: array
          items:
            type: string
          example:
            - Customer interested
            - Will call back
        freeTextRemark:
          type: string
          nullable: true
          example: Customer is in a difficult situation
        disputeDetails:
          type: string
          nullable: true
          example: Customer claims amount is incorrect
        createdAt:
          type: string
          format: date-time
          example: 2026-06-19T10:30:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-06-19T10:30:00.000Z
      required:
        - _id
        - customerId
        - customerName
        - staffId
        - staffName
        - loggedAt
        - contactMethod
        - outcome

    NotificationResponse:
      type: object
      properties:
        _id:
          type: string
          description: MongoDB notification ID
          example: 507f1f77bcf86cd799439099
        staffId:
          type: integer
          example: 2645
        userId:
          type: integer
          example: 3027
        type:
          type: string
          description: new_transaction is legacy (no longer emitted - was too noisy, fired on every ledger entry). payment_received fires only when a payment resolves an open follow-up.
          enum:
            - new_transaction
            - promise_due
            - promise_reminder
            - payment_received
          example: payment_received
        title:
          type: string
          example: 5 new transactions for ABC Company
        message:
          type: string
          example: ABC Company has 5 new ledger entries (debit ₹25,000, credit ₹10,000)
        ledgerId:
          type: integer
          nullable: true
          example: 882028
        ledgerName:
          type: string
          nullable: true
          example: ABC Company
        metadata:
          type: object
          nullable: true
          description: Extra event-specific data (e.g. new entry count, debit/credit totals)
        isRead:
          type: boolean
          example: false
        readAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          example: 2026-07-17T14:15:03.787Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-07-17T14:15:03.787Z
      required:
        - _id
        - staffId
        - userId
        - type
        - title
        - message
        - isRead

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: Unauthorized - no token provided

    StaffScoreResponse:
      type: object
      description: Monthly performance score for a staff member based on attendance, leaves, and appearance
      properties:
        _id:
          type: string
          description: MongoDB score ID
          example: 6a4417ccd5ddf48055605a22
        staffId:
          type: integer
          example: 2645
        staffName:
          type: string
          example: ANAS
        month:
          type: string
          example: "2026-06"
        year:
          type: integer
          example: 2026
        monthNumber:
          type: integer
          example: 6
        totalScore:
          type: number
          description: Total earned score (sum of all categories)
          example: 25
        maxPossibleScore:
          type: number
          description: |
            Maximum possible score for active rules.
            Total framework is 100 points:
            - Attendance: 10 points
            - Leaves: 10 points
            - Appearance: 5 points
            - Future rules: 75 points (reserved)
          example: 25
        percentageScore:
          type: number
          description: Score as percentage (0-100)
          example: 100
        breakdown:
          type: array
          description: Detailed score breakdown by category (Attendance, Leave, Appearance)
          items:
            type: object
            properties:
              rule:
                type: string
                enum: [AttendanceRule, LeaveRule, AppearanceRule]
                example: "AttendanceRule"
              category:
                type: string
                enum: [Attendance, Leave, Appearance]
                example: "Attendance"
              earned:
                type: integer
                description: Points earned for this category
                example: 10
              possible:
                type: integer
                description: Maximum possible points for this category
                example: 10
              passed:
                type: boolean
                description: Whether staff met the criteria for this category
                example: true
              explanation:
                type: string
                description: Human-readable explanation of the score
                example: "0 late arrivals (max 3 allowed)"
              metrics:
                type: array
                description: Detailed metrics that contributed to this score
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Metric name (e.g., lateCases, leaveCount, violationDays)
                      example: "lateCases"
                    value:
                      type: integer
                      description: Actual metric value
                      example: 0
                    contribution:
                      type: integer
                      description: Points contributed by this metric
                      example: 10
        calculatedAt:
          type: string
          format: date-time
          description: When this score was calculated
        calculatedBy:
          type: string
          example: "system"
        remarks:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ExtraPerformanceResponse:
      type: object
      description: Extra performance submission with approval status
      properties:
        _id:
          type: string
          description: MongoDB performance submission ID
          example: 6a4417ccd5ddf48055605a23
        staffId:
          type: integer
          example: 2645
        staffName:
          type: string
          example: ANAS
        month:
          type: string
          example: "2026-06"
        year:
          type: integer
          example: 2026
        monthNumber:
          type: integer
          example: 6
        title:
          type: string
          description: Performance title
          example: "Led customer training session"
        description:
          type: string
          description: Detailed description
          example: "Conducted comprehensive training for 15 customers"
        date:
          type: string
          format: date
          description: Date performance occurred (IST)
          example: "2026-06-28"
        category:
          type: string
          enum: [Training, "Process Improvement", "Customer Excellence", "Team Leadership", Other]
          example: "Training"
        status:
          type: string
          enum: [pending, approved, rejected]
          description: Approval status
          example: "approved"
        points:
          type: integer
          description: Points awarded (10 when approved)
          example: 10
        approvedBy:
          type: string
          description: MongoDB user ID of superadmin who approved (if approved)
          nullable: true
        approvedAt:
          type: string
          format: date-time
          description: Approval timestamp (if approved)
          nullable: true
        rejectionReason:
          type: string
          description: Reason for rejection (if rejected)
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: When performance was submitted
        updatedAt:
          type: string
          format: date-time

    ScoringConfigResponse:
      type: object
      description: |
        Scoring rules configuration for a specific month. Controls point allocation for all scoring categories.

        **Total Score: 100 points**
        - Attendance: 10 points
        - Leaves: 10 points
        - Appearance: 5 points
        - Extra Performance: 10 points
        - Future rules: 65 points (reserved)
      properties:
        _id:
          type: string
          description: MongoDB config ID
        month:
          type: string
          description: Month in YYYY-MM format
          example: "2026-06"
        year:
          type: integer
          example: 2026
        monthNumber:
          type: integer
          minimum: 1
          maximum: 12
          example: 6
        attendance:
          type: object
          description: Attendance scoring rules (Late arrivals)
          properties:
            maxLateCases:
              type: integer
              description: Maximum late cases allowed (> lateThresholdMinutes) before penalty
              example: 3
            pointsIfNoLate:
              type: integer
              description: Points awarded if late cases within limit
              example: 10
            penaltyIfExceeds:
              type: integer
              description: Penalty points if exceeds maxLateCases
              example: -10
            lateThresholdMinutes:
              type: integer
              description: Minutes after work start (9:00 AM) to be considered late
              example: 30
        leaves:
          type: object
          description: Leave scoring rules (Approved leaves per month)
          properties:
            maxAllowedPerMonth:
              type: integer
              description: Maximum approved leaves allowed per month
              example: 2
            pointsIfWithinLimit:
              type: integer
              description: Points awarded if leaves within limit
              example: 10
            penaltyIfExceeds:
              type: integer
              description: Penalty points if exceeds maxAllowedPerMonth
              example: -10
        appearance:
          type: object
          description: Appearance scoring rules (Dress code violations)
          properties:
            enabled:
              type: boolean
              description: Enable/disable appearance scoring
              example: true
            pointsPerViolation:
              type: integer
              description: Points deducted per violation day
              example: -5
            maxPoints:
              type: integer
              description: Maximum points for appearance category
              example: 5
            violations:
              type: array
              description: Types of violations to track
              items:
                type: string
                enum: [uniform, socks_banyan, hair_beard_moustache]
              example: ["uniform", "socks_banyan", "hair_beard_moustache"]
        extraPerformance:
          type: object
          description: Extra performance scoring rules (Approved submissions)
          properties:
            pointsPerPerformance:
              type: integer
              description: Points awarded per approved performance
              example: 10
            maxPointsAllowed:
              type: integer
              description: Maximum points allowed per month for extra performance
              example: 10
        isActive:
          type: boolean
          description: Whether this config is active
          example: true
        createdAt:
          type: string
          format: date-time
          description: When this config was created
        updatedAt:
          type: string
          format: date-time
          description: When this config was last updated

