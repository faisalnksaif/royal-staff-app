                  success:
                    type: boolean
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      pages:
                        type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FollowUpResponse'
                  summary:
                    type: object
