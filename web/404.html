<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // Redirect all 404s back to index with the path encoded in the query string
    var path = window.location.pathname.replace('/royal-staff-app', '') + window.location.search
    window.location.replace('/royal-staff-app/?p=' + encodeURIComponent(path))
  </script>
</head>
<body></body>
</html>
