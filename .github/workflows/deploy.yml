name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_API_BASE_URL: https://api.sulthanpages.com/project/royal/api
          EXPO_BASE_URL: /royal-staff-app

      - name: Fix asset paths and inject SPA routing scripts
        run: |
          python3 - <<'EOF'
          import pathlib

          BASE = "/royal-staff-app"

          p = pathlib.Path("dist/index.html")
          html = p.read_text()

          # Inject SPA routing scripts right after <head>
          scripts = (
            '<script>'
            f'if(window.location.pathname==="{BASE}")window.location.replace("{BASE}/");'
            '</script>'
            '<script>'
            '(function(){'
            'var p=sessionStorage.getItem("__spa_path");'
            'if(p){sessionStorage.removeItem("__spa_path");'
            f'window.history.replaceState(null,"","{BASE}"+p);'
            '}'
            '})();'
            '</script>'
          )
          html = html.replace("<head>", "<head>" + scripts, 1)
          p.write_text(html)
          EOF

      - name: Copy 404 fallback
        run: cp web/404.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
