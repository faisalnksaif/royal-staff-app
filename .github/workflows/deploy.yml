name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_API_BASE_URL: https://api.sulthanpages.com/project/royal/api
          EXPO_BASE_URL: /royal-staff-app

      - name: Fix asset paths and inject SPA routing scripts
        run: |
          sed -i 's|href="/|href="/royal-staff-app/|g' dist/index.html
          sed -i 's|src="/|src="/royal-staff-app/|g' dist/index.html
          sed -i 's|<head>|<head><script>if(window.location.pathname==="/royal-staff-app")window.location.replace("/royal-staff-app/");</script><script>(function(){var p=sessionStorage.getItem("__spa_path");if(p){sessionStorage.removeItem("__spa_path");window.history.replaceState(null,"","/royal-staff-app"+p);}})();</script>|' dist/index.html

      - name: Copy 404 fallback
        run: cp web/404.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
